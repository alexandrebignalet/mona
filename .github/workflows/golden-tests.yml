name: Golden Tests

on:
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated golden test categories (blank = all)"
        required: false
        default: ""

jobs:
  golden-tests:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Golden Tests
        run: |
          CATEGORIES_ARG=""
          if [ -n "${{ inputs.categories }}" ]; then
            CATEGORIES_ARG="-Dgolden.categories=${{ inputs.categories }}"
          fi
          ./gradlew test --tests "*.GoldenParsingTest" --tests "*.GoldenContextTest" --no-daemon $CATEGORIES_ARG

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-test-reports
          path: build/reports/tests/
          retention-days: 7
